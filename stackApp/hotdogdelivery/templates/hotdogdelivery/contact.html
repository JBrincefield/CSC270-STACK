{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Contact Us</title>
	<link rel="stylesheet" href="{% static 'hotdogdelivery/styles.css' %}">
</head>
<body>
	<nav>
		<div class="nav-links">
			<a href="/">Home</a>
			<a href="/contact/">Contact</a>
			<a href="/hotdogs/">Hotdogs vs Sausages</a>
		</div>
	</nav>

	<main>
		<section class="hero">
			<h1>Contact Us</h1>
            <img 
                src="{% static 'hotdogdelivery/contactIcon.png' %}" 
                alt="Contact Icon"
                class="contact-icon"
            >
            
			<p>
				Have questions about our hotdog delivery service or want to share your thoughts?
				Fill out the form below and we will get back to you soon.
			</p>

			<form class="contact-form">
				<div class="form-group">
					<label for="name">Full Name</label>
					<input type="text" id="name" name="name" placeholder="Enter your name" required>
				</div>

				<div class="form-group">
					<label for="email">Email Address</label>
					<input type="email" id="email" name="email" placeholder="Enter your email" required>
				</div>

				<div class="form-group">
					<label for="subject">Subject</label>
					<input type="text" id="subject" name="subject" placeholder="Enter a subject" required>
				</div>

				<div class="form-group">
					<label for="message">Message</label>
					<textarea id="message" name="message" rows="6" placeholder="Write your message here..." required></textarea>
				</div>

				<button type="submit" class="btn">Send Message</button>
			</form>
		</section>
	</main
